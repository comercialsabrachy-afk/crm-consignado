<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}CRM Consignado{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background:#0b1220;
      color:#e8eefc;
      min-height:100vh;
    }

    .navbar-custom{
      background: rgba(255,255,255,.06);
      border-bottom: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(12px);
    }

    .navbar-brand,
    .nav-link{
      color:#e8eefc !important;
      font-weight:600;
      white-space: nowrap;
    }

    .nav-link:hover{
      color:#ffffff !important;
    }

    .content-wrap{
      padding: 24px 0;
    }

    .panel{
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
    }

    .table-dark-custom{
      --bs-table-bg: transparent;
      --bs-table-color: #e8eefc;
      --bs-table-border-color: rgba(255,255,255,.08);
      --bs-table-hover-bg: rgba(255,255,255,.04);
      --bs-table-hover-color: #fff;
    }

    .text-soft{
      color: rgba(255,255,255,.65);
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
      <a class="navbar-brand" href="/">CRM Consignado</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuCRM" aria-controls="menuCRM" aria-expanded="false" aria-label="Alternar navegação">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menuCRM">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/">Kanban</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/clientes/">Clientes</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/clientes/novo/">Novo Cliente</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/oportunidades/nova/">Nova Oportunidade</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/importacao/">Importar Excel</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/admin/">Admin</a>
          </li>
        </ul>

        <span class="navbar-text text-white-50">
          Sistema CRM
        </span>
      </div>
    </div>
  </nav>

  <main class="container content-wrap">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
