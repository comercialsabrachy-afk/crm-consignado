<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Importar clientes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

<h3>Importar clientes via Excel</h3>

<a href="/" class="btn btn-dark mb-3">Voltar ao painel</a>

<form method="post" enctype="multipart/form-data" class="card p-3">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Arquivo Excel (.xlsx)</label>
{{ form.arquivo }}
</div>

<div class="mb-3">
<label class="form-label">Convênio padrão</label>

<select class="form-select" name="convenio_id">

<option value="">Selecione</option>

{% for c in convenios %}
<option value="{{ c.id }}">{{ c.nome }}</option>
{% endfor %}

</select>
</div>

<button class="btn btn-primary">Importar</button>

</form>

{% if resultado %}

<div class="card mt-4 p-3">

<h5>Resultado</h5>

<p><strong>Importados:</strong> {{ resultado.importados }}</p>

<ul>
{% for erro in resultado.erros %}
<li class="text-danger">{{ erro }}</li>
{% endfor %}
</ul>

</div>

{% endif %}

</div>

</body>
</html>
